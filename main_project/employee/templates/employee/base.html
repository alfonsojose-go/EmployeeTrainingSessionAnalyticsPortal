<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Child templates can override the page title block. -->
  <title>{% block title %}Employee Training Analytics Portal{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <!-- Shared navigation is rendered on every page that extends this base template. -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'home' %}">Training Analytics Portal</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'employee_list' %}">Employees</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'course_list' %}">Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'session_list' %}">Sessions</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'enrollment_list' %}">Enrollments</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'analytics_hub' %}">Analytics</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container pb-5">
    <!-- Main content placeholder for page-specific templates. -->
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
