{% extends "employee/base.html" %}
{% block title %}Employees{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Employees</h1>
<!-- Department filter uses GET so the selected value is reflected in the URL. -->
<form method="get" class="row g-2 align-items-end mb-4">
  <div class="col-auto">
    <label class="form-label mb-0" for="department">Filter: Department</label>
    <select class="form-select" id="department" name="department" onchange="this.form.submit()">
      <option value="">All</option>
      {% for value, label in department_choices %}
        <option value="{{ value }}" {% if department == value %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto">
    <a class="btn btn-outline-secondary" href="{% url 'employee_list' %}">Clear</a>
  </div>
</form>
<div class="table-responsive">
  <!-- Employee table; actions are placeholders for future CRUD endpoints. -->
  <table class="table table-striped table-bordered bg-white">
    <thead class="table-light">
      <tr><th>Name</th><th>Email</th><th>Department</th><th>Actions</th></tr>
    </thead>
    <tbody>
      {% for e in employees %}
      <tr>
        <td>{{ e.full_name }}</td>
        <td>{{ e.email }}</td>
        <td>{{ e.get_department_display }}</td>
        <td><span class="text-muted">—</span></td>
      </tr>
      {% empty %}
      <tr><td colspan="4">No employees yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
